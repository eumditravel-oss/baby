<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#4F8F5A" />
  <title>성남 산후조리원 비교</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <main>
      <section class="screen active" id="screen-home">
        <header class="home-top">
          <div class="status-row">
            <span>성남 수정구 기준</span>
            <span>모바일 비교</span>
          </div>
          <h1>성남 산후조리원 비교</h1>
          <label class="search-box" for="searchInput">
            <span aria-hidden="true">⌕</span>
            <input id="searchInput" type="search" placeholder="조리원 검색" autocomplete="off" />
          </label>
          <div class="filter-chips" aria-label="조리원 정렬">
            <button class="active" data-sort="rank">추천순</button>
            <button data-sort="distance">거리순</button>
            <button data-sort="price">가격순</button>
            <button data-sort="rating">평점순</button>
          </div>
        </header>

        <section class="home-recommend" aria-labelledby="homeRecommendTitle">
          <div class="section-title">
            <h2 id="homeRecommendTitle">추천 조리원</h2>
            <span id="homeResultCount">3곳</span>
          </div>
          <div class="recommend-list" id="homeCards"></div>
        </section>

        <section class="dashboard-grid" aria-label="대시보드 메뉴">
          <button class="dash-card" data-screen="nursery">
            <span class="dash-icon">🏥</span>
            <strong>조리원</strong>
            <small>카드 비교</small>
          </button>
          <button class="dash-card" data-screen="meal">
            <span class="dash-icon">🍱</span>
            <strong>식단표</strong>
            <small>월별 식단</small>
          </button>
          <button class="dash-card" data-screen="checklist">
            <span class="dash-icon">📋</span>
            <strong>체크리스트</strong>
            <small>상담 항목</small>
          </button>
          <button class="dash-card" data-screen="memo">
            <span class="dash-icon">✏️</span>
            <strong>상담메모</strong>
            <small>조리원별 저장</small>
          </button>
        </section>
      </section>

      <section class="screen" id="screen-nursery">
        <header class="screen-head">
          <p>Nursery</p>
          <h2>조리원 비교</h2>
          <span id="nurseryStatus">추천순 8곳</span>
        </header>
        <div class="nursery-list" id="nurseryList"></div>

        <section class="compare-section" aria-labelledby="scoreCompareTitle">
          <div class="section-title">
            <h2 id="scoreCompareTitle">한눈 비교</h2>
            <span>등급 요약</span>
          </div>
          <div class="score-list" id="scoreList"></div>
        </section>
      </section>

      <section class="screen" id="screen-meal">
        <header class="screen-head">
          <p>Meal Plan</p>
          <h2>식단표</h2>
          <span>월별 식단 카드</span>
        </header>
        <div class="month-tabs" id="monthTabs" aria-label="식단 월 선택"></div>
        <div class="meal-grid" id="mealGrid"></div>
      </section>

      <section class="screen" id="screen-checklist">
        <header class="screen-head">
          <p>Checklist</p>
          <h2>상담 체크</h2>
          <span>체크 상태 자동 저장</span>
        </header>
        <div class="category-tabs" id="checkTabs" aria-label="체크리스트 분류"></div>
        <div class="progress-card">
          <div>
            <span>진행률</span>
            <strong id="checkProgress">0 / 0</strong>
          </div>
          <div class="progress-track"><i id="checkProgressBar"></i></div>
        </div>
        <div class="check-list" id="checkList"></div>
      </section>

      <section class="screen" id="screen-memo">
        <header class="screen-head">
          <p>Memo</p>
          <h2>상담 메모</h2>
          <span id="memoSaveState">자동 저장</span>
        </header>
        <section class="memo-panel">
          <label class="field-label">
            조리원 선택
            <select id="memoNursery"></select>
          </label>
          <label class="field-label">
            가격
            <input id="memoPrice" type="text" placeholder="예: 2주 580만원" />
          </label>
          <label class="field-label">
            마사지
            <input id="memoMassage" type="text" placeholder="예: 산전 1회, 산후 2회" />
          </label>
          <label class="field-label">
            장점
            <textarea id="memoPros" rows="4" placeholder="좋았던 점을 기록"></textarea>
          </label>
          <label class="field-label">
            단점
            <textarea id="memoCons" rows="4" placeholder="아쉬운 점을 기록"></textarea>
          </label>
        </section>
      </section>
    </main>

    <nav class="bottom-nav" aria-label="하단 메뉴">
      <button class="active" data-screen="home"><span>⌂</span>홈</button>
      <button data-screen="nursery"><span>🏥</span>조리원</button>
      <button data-screen="meal"><span>🍱</span>식단표</button>
      <button data-screen="checklist"><span>☑</span>체크</button>
      <button data-screen="memo"><span>✎</span>메모</button>
    </nav>
  </div>

  <div class="modal" id="detailModal" aria-hidden="true">
    <div class="modal-backdrop" data-close="modal"></div>
    <article class="modal-card" id="modalCard"></article>
  </div>

  <script src="script.js"></script>
</body>
</html>
